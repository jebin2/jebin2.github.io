<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#e6f0fd">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Caveat:wght@400..700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/stats.css">

    <title>jebin2 — stats</title>
</head>
<body>
    <!-- Main Background Decorations -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden -z-10 opacity-40">
        <span class="material-symbols-outlined absolute text-5xl text-crayon-yellow top-20 left-[10%] rotate-12 crayon-heavy animate-pulse">star</span>
        <span class="material-symbols-outlined absolute text-7xl text-crayon-blue top-[15%] right-[20%] -rotate-6 crayon-heavy opacity-50">cloud</span>
    </div>

    <div id="site-header"></div>

    <main class="container">
        <div class="section-label">// stats</div>

        <!-- Summary -->
        <section class="section">
            <div class="stats-summary" id="stats-summary"></div>
        </section>

        <!-- Page Views -->
        <section class="section">
            <div class="section-label">// page views</div>
            <div id="stats-pages"></div>
        </section>

        <!-- Project Clicks -->
        <section class="section">
            <div class="section-label">// project clicks</div>
            <div id="stats-projects"></div>
        </section>

        <!-- Post Reads -->
        <section class="section">
            <div class="section-label">// post reads</div>
            <div id="stats-posts"></div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script type="module" src="js/stats.js"></script>

    <!-- SVG Filters -->
    <svg style="visibility: hidden; position: absolute;" width="0" height="0" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <filter id="crayon-texture">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2" xChannelSelector="R" yChannelSelector="G" />
            </filter>
        </defs>
    </svg>
</body>
</html>
