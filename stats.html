<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <meta name="theme-color" content="#131313">

    <!-- Favicon -->
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png">

    <!-- Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/stats.css">

    <title>jebin2 — stats</title>
</head>
<body>
    <div id="site-header"></div>

    <main class="container">
        <div class="section-label">// stats</div>

        <!-- Summary -->
        <section class="section">
            <div class="stats-summary" id="stats-summary"></div>
        </section>

        <!-- Page Views -->
        <section class="section">
            <div class="section-label">// page views</div>
            <div id="stats-pages"></div>
        </section>

        <!-- Project Clicks -->
        <section class="section">
            <div class="section-label">// project clicks</div>
            <div id="stats-projects"></div>
        </section>

        <!-- Post Reads -->
        <section class="section">
            <div class="section-label">// post reads</div>
            <div id="stats-posts"></div>
        </section>
    </main>

    <div id="site-footer"></div>

    <script type="module" src="js/stats.js"></script>
</body>
</html>
